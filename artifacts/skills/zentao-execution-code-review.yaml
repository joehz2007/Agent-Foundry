id: zentao-execution-code-review
type: skill
title: ZenTao Execution Code Review
version: 1.2.1
description: >-
  Perform task-aligned code review using ZenTao execution plans and the rd-audit baseline. Use whenever the user asks to
  review code against 禅道任务, 执行计划, PR links in ZenTao, baseline JSON, or whether implementation matches task
  requirements. This skill requires PR evidence for included development/code tasks. In full-execution review, treat
  missing PR as a review gap only for completed code tasks (for example `done`/closed/finished) unless the task clearly
  says no PR is needed, such as configuration-only or non-code work. For `doing`/`wait` tasks, missing PR usually means
  the task has not entered code review yet and should be skipped without being counted as a defect. Single-task review
  stops and asks for a PR when the requested task is ready for code review but lacks reliable PR evidence. Prefer this over generic code review when a
  ZenTao task, execution, baseline, or PR-to-task mapping is involved.
triggers:
  - 按禅道任务 review 代码
  - 对照 baseline review
  - 检查代码是否满足执行计划
  - 禅道 PR 代码审查
  - 任务对齐型 Code Review
  - zentao code review
  - review-baseline
targets: [claude-code, codex, pi]
inputs:
  - rd_audit_baseline_json
  - zentao_task_or_execution
  - pr_links
  - repository_or_diff
outputs:
  format: markdown_and_json
  sections:
    - summary_report
    - per_task_reports
    - review_baseline_json
instructions: |
  You orchestrate code review against ZenTao task facts. Your core question is: does the actual code change satisfy the
  task baseline without introducing extra, unmapped, or risky behavior? You own business/task alignment. Delegate deep
  backend/frontend technical implementation review to specialized code-review skills.

  Responsibility boundary:
  - `zentao-execution-rd-audit` owns the fact-layer baseline: task requirements, acceptance criteria, risks, attachments,
    and PR references.
  - This skill owns the interpretation layer: task type, expected business changes, PR-to-task mapping, reverse mapping,
    task-alignment conclusions, and final report integration.
  - `code-review-spring-boot` owns Spring Boot backend technical implementation review.
  - `code-review-vue` owns Vue frontend technical implementation review.
  - Never modify rd-audit baseline JSON. Write derived fields only to `review-baseline.json`.

  Modes:
  - quick: PR mapping + task acceptance alignment + obvious blocking findings only.
  - standard: default; task alignment + reverse mapping + delegated Spring Boot/Vue technical review for touched code.
  - deep: standard mode plus broader reverse mapping and deeper delegated technical reviews. Use only when requested or
    needed for high-risk migration/payment/security tasks.

  Workflow:
  1. Lock review scope.
     - Prefer rd-audit `*-baseline.json`. If absent, ask to run rd-audit or proceed conservatively only if the user insists.
     - Determine full-execution vs single-task mode.
     - Exclude QA/test/verification/regression/canceled tasks from code review unless the user explicitly asks to review test code.

  2. Require PR evidence, with status-aware handling.
     - Read PRs first from rd-audit baseline `pr_refs`.
     - If missing or suspected incomplete, re-extract from task body, task `raw.actions[].comment`, story body,
       story `raw.actions[].comment`, and attachment text when available; then use user-provided PRs.
     - For completed code tasks (`done`, closed, finished, or equivalent), missing or unreliable PR is a review gap
       unless the task explicitly states it is non-code/configuration-only/no-PR work. Record it as `已完成但缺少可审PR`.
     - For in-progress or not-started tasks (`doing`, `wait`, or equivalent), missing PR is normally expected and only
       means the task is not ready for this code-review run. Skip it with wording such as `进行中，暂无PR属正常` or
       `未到代码审查阶段` rather than treating it as a defect.
     - Full execution: include only tasks with reliable PRs; record skipped tasks in `排除任务` with the status-aware reason above.
     - Single task: missing or unreliable PR stops the review only when the task is completed or the user explicitly asks
       to review it now; otherwise state that it is not ready for code review yet.
     - Do not replace a missing PR with arbitrary local diff, branch diff, time-window commits, or keyword search.

  3. Derive review-baseline.
     - Follow `references/review-baseline-schema.md`.
     - Classify task types using `references/task-type-checklists.md`; multiple types may apply.
     - Derive `expected_changes`, `anti_pattern_targets`, `reachability_targets`, `scope_modules`, and hard gates.
     - Set `code_scope_confidence` based on PR/diff/repository completeness.

  4. Review task alignment and delegate technical review.
     - Read PR diff enough to map changed files to tasks and acceptance criteria. Do not review the whole repository by default.
     - Map each task requirement and acceptance criterion to code evidence or a gap.
     - Classify changed files and delegate technical implementation review according to `references/technical-delegation.md`:
       - Spring Boot / Java / Kotlin / MyBatis / backend config -> `code-review-spring-boot`.
       - Vue / TypeScript / Vite / Element Plus / frontend route/store/API files -> `code-review-vue`.
     - Consume delegated findings as technical findings; map them back to task IDs when possible.
     - Perform reverse mapping: code changes inside reviewed PRs must be either task-aligned, task-extraneous, orphan, or no-business-risk.

  5. Conclude with alignment and technical findings separated.
     - Use `references/review-rubric.md`.
     - Keep business-alignment problems separate from delegated technical implementation problems.
     - If a technical finding prevents task acceptance or triggers a hard gate, reflect that in the final task conclusion.
     - If evidence is incomplete, cap the conclusion and explain the limitation.

  6. Save reports.
     - Use `references/report-structure.md`.
     - Full execution: create one directory containing `_summary.md`, one `task-<id>-<slug>.md` per included development/code task,
       and `review-baseline.json`.
     - Single task: create one directory containing `_summary.md` and `review-baseline.json`.
     - Final reply should contain the report directory, `_summary.md` path, task file list, and a very short conclusion.

  Important compatibility rule:
  - Prefer fetch/context7 MCP for external docs when available. If tool names differ or external tools are unavailable,
    use equivalent web/fetch tools or mark external evidence as unverified. Do not assume `WebFetch` exists on every platform.
resources:
  references:
    - references/zentao-execution-code-review/review-baseline-schema.md
    - references/zentao-execution-code-review/task-type-checklists.md
    - references/zentao-execution-code-review/review-rubric.md
    - references/zentao-execution-code-review/report-structure.md
    - references/zentao-execution-code-review/technical-delegation.md
  scripts: []
evals:
  - evals/zentao-execution-code-review/full-execution-with-missing-pr.yaml
  - evals/zentao-execution-code-review/payment-task-review.yaml
changelog:
  - version: 1.2.1
    date: 2026-06-11
    changes:
      - Removed Claude Code allowed-tools restriction so ZenTao MCP tools remain available for PR/task refresh.
  - version: 1.2.0
    date: 2026-06-09
    changes:
      - Adds status-aware PR handling: done/finished code tasks should have PR evidence unless explicitly non-code/no-PR; doing/wait tasks without PR are skipped as not ready, not treated as defects.
  - version: 1.1.0
    date: 2026-06-08
    changes:
      - Refocused as a ZenTao task-alignment orchestrator.
      - Delegates Spring Boot technical review to code-review-spring-boot.
      - Delegates Vue technical review to code-review-vue.
  - version: 1.0.0
    date: 2026-06-05
    changes:
      - Rewritten in Agent Foundry neutral artifact format.
      - Prioritizes rd-audit pr_refs and enforces PR requirement by review mode.
      - Adds quick/standard/deep modes and broader task-type checklists.
